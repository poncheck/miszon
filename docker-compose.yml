version: "3.9"

services:
  mission-control:
    build:
      context: .
      network: host
    network_mode: host
    volumes:
      - "/root/.openclaw/workspace/calendar:/app/data/events"
    environment:
      - NODE_ENV=production
      - WS_URL=ws://192.168.88.232:18789?token=91e998be87da17bc84488a4bbcc3a7f8c2398942b24f89e8
      - WS_TOKEN=91e998be87da17bc84488a4bbcc3a7f8c2398942b24f89e8
      - PORT=3000
      - EVENTS_DIR=/app/data/events
    restart: unless-stopped
