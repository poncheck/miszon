version: "3.9"

services:
  mission-control:
    build:
      context: .
      network: host
    ports:
      - "3000:3000"
    volumes:
      - "/root/.openclaw/workspace/calendar:/app/data/events"
    environment:
      - NODE_ENV=production
      - WS_URL=ws://host.docker.internal:18789
      - PORT=3000
      - EVENTS_DIR=/app/data/events
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
