version: "3.9"

services:
  mission-control:
    build:
      context: .
      network: host
    network_mode: host
    volumes:
      - "/root/.openclaw/workspace/calendar:/app/data/events"
    environment:
      - NODE_ENV=production
      - WS_URL=ws://localhost:18789
      - PORT=3000
      - EVENTS_DIR=/app/data/events
    restart: unless-stopped
